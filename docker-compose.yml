version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: devops-postgres
    environment:
      POSTGRES_USER: devops
      POSTGRES_PASSWORD: devops123
      POSTGRES_DB: devopsdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devops -d devopsdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: devops-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_NAME: devops-api-local
      APP_VERSION: compose
      PORT: 8080
      DB_HOST: postgres
      DB_PORT: 5432
      POSTGRES_USER: devops
      POSTGRES_PASSWORD: devops123
      POSTGRES_DB: devopsdb
    ports:
      - "8080:8080"

volumes:
  postgres_data: