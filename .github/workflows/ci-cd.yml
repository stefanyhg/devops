name: CI/CD GKE
on:
  push:
    branches:
      - main

env:
  PROJECT_ID: devops-final-gcp
  REGION: us-central1
  GAR_REPOSITORY: devops-final
  IMAGE_NAME: devops-api
  CLUSTER_NAME: devops-gke
  CLUSTER_ZONE: us-central1-a
  NAMESPACE: devops-final
  DEPLOYMENT_NAME: devops-api
  CONTAINER_NAME: devops-api

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Install GKE Auth Plugin
        run: |
          gcloud components install gke-gcloud-auth-plugin --quiet

      - name: Configure Docker
        run: gcloud auth configure-docker $REGION-docker.pkg.dev --quiet

      - name: Build and push Docker image
        run: |
          IMAGE_URI="$REGION-docker.pkg.dev/$PROJECT_ID/$GAR_REPOSITORY/$IMAGE_NAME:$GITHUB_SHA"
          docker build -t "$IMAGE_URI" .
          docker push "$IMAGE_URI"

      - name: Get GKE credentials
        run: |
          gcloud container clusters get-credentials "$CLUSTER_NAME" --zone "$CLUSTER_ZONE" --project "$PROJECT_ID"

      - name: Deploy to GKE
        run: |
          IMAGE_URI="$REGION-docker.pkg.dev/$PROJECT_ID/$GAR_REPOSITORY/$IMAGE_NAME:$GITHUB_SHA"
          DEPLOYMENT="deployment/$DEPLOYMENT_NAME"
          kubectl set image "$DEPLOYMENT" $CONTAINER_NAME="$IMAGE_URI" -n "$NAMESPACE"
          kubectl rollout status deployment/$DEPLOYMENT_NAME -n $NAMESPACE
          kubectl get pods -n $NAMESPACE